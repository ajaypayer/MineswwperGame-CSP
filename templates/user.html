<!DOCTYPE html>
<html>
<head>
    <title>Minesweeper - User Mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/" class="btn btn-back">← Back to Menu</a>

<div class="title-container">
    <h1>User Challenge</h1>
</div>

<div class="game-container">
    <div class="board-wrapper">
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">MINES</div>
                <div id="mineCount" class="stat-value">00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div id="timer" class="stat-value">000</div>
            </div>
        </div>
        
        <div id="board"></div>
        
        <div class="controls user-controls">
            <div class="mode-toggle">
                <button id="revealBtn" class="btn btn-mode active" onclick="setMode('reveal')">
                    <span class="icon">🔍</span> REVEAL
                </button>
                <button id="flagBtn" class="btn btn-mode" onclick="setMode('flag')">
                    <span class="icon">🚩</span> FLAG
                </button>
            </div>
            <button class="btn btn-reset-small" onclick="newGame()">NEW GAME</button>
        </div>
    </div>
</div>

<script>
let gameId = null;
let timer = 0;
let timerInterval;
let difficulty = '{{ difficulty }}';
let gameOver = false;
let currentMode = 'reveal'; // 'reveal' or 'flag'

function setMode(mode) {
    currentMode = mode;
    document.getElementById("revealBtn").classList.toggle("active", mode === 'reveal');
    document.getElementById("flagBtn").classList.toggle("active", mode === 'flag');
}

function updateBoard(state) {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";
    const rows = state.length;
    const cols = state[0].length;

    for (let i = 0; i < rows; i++) {
        let row = document.createElement("div");
        row.classList.add("row");
        for (let j = 0; j < cols; j++) {
            let cell = document.createElement("div");
            cell.classList.add("cell");
            
            let val = state[i][j];
            if (val === 'F') {
                cell.innerText = "🚩";
                cell.classList.add("flagged");
            } else if (val === 'M') {
                cell.innerText = "💣";
                cell.classList.add("mine", "revealed");
            } else if (val !== '?') {
                cell.innerText = val === '0' ? "" : val;
                cell.classList.add("revealed");
                if (val > 0) cell.classList.add(`n${val}`);
            }

            cell.onmousedown = (e) => {
                if (gameOver) return;
                // If left click
                if (e.button === 0) {
                    if (currentMode === 'reveal') revealCell(i, j);
                    else flagCell(i, j);
                }
            };
            // Always allow right-click to flag regardless of mode
            cell.oncontextmenu = (e) => {
                e.preventDefault();
                if (gameOver) return;
                flagCell(i, j);
            };
            row.appendChild(cell);
        }
        boardDiv.appendChild(row);
    }
}

async function newGame() {
    gameOver = false;
    const response = await fetch('/api/new_game', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ difficulty })
    });
    const data = await response.json();
    gameId = data.game_id;
    updateBoard(data.state);
    
    // Reset timer and mine count
    updateMineCount(data.state);
    
    timer = 0;
    document.getElementById("timer").innerText = "000";
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timer = Math.min(timer + 1, 999);
        document.getElementById("timer").innerText = String(timer).padStart(3, '0');
    }, 1000);
}

function updateMineCount(state) {
    let flagged = 0;
    state.forEach(row => row.forEach(c => { if(c === 'F') flagged++ }));
    const totalMines = difficulty === 'easy' ? 5 : (difficulty === 'medium' ? 10 : 15);
    document.getElementById("mineCount").innerText = String(Math.max(0, totalMines - flagged)).padStart(2, '0');
}

async function revealCell(i, j) {
    const res = await fetch('/api/reveal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_id: gameId, i, j })
    });
    const data = await res.json();
    processResult(data);
}

async function flagCell(i, j) {
    const res = await fetch('/api/flag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_id: gameId, i, j })
    });
    const data = await res.json();
    processResult(data);
}

function processResult(data) {
    updateBoard(data.state);
    updateMineCount(data.state);
    if (data.game_over) {
        gameOver = true;
        clearInterval(timerInterval);
        if (data.won) alert("WINNER! You found all mines.");
        else alert("BOOM! Game Over.");
    }
}

newGame();
</script>
</body>
</html>

</body>
</html>
